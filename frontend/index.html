<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuvera Pulse Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-cyan: #00D1FF;
            --brand-black: #0F0F0F;
            --text-main: #2D3436;
            --bg-light: #F4F7F6;
            --white: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.95);
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }
        
        header {
            background-color: var(--brand-black);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-top: 6px solid var(--brand-cyan);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .logo {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .logo span {
            color: var(--brand-cyan);
        }
        
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--brand-black);
            margin: 40px 0 20px;
            display: flex;
            align-items: center;
        }
        
        .section-title::before {
            content: "";
            width: 8px;
            height: 24px;
            background: var(--brand-cyan);
            margin-right: 15px;
            border-radius: 4px;
        }
        
        .card {
            background: var(--glass);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .theme-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .badge {
            background: #E1F9FF;
            color: #0084A3;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .quote {
            font-size: 15px;
            color: #636E72;
            font-style: italic;
            margin-bottom: 15px;
            padding: 15px;
            background: #F9F9F9;
            border-radius: 8px;
            border-left: 4px solid #DFE6E9;
        }
        
        .action-card {
            background: linear-gradient(135deg, #00D1FF 0%, #0084A3 100%);
            color: white;
            padding: 30px;
            border-radius: 16px;
        }
        
        .action-item {
            display: flex;
            align-items: start;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 16px;
        }
        
        .action-item::before {
            content: "✦";
            margin-right: 15px;
            color: #000;
        }
        
        .stakeholder-card {
            border-left: 5px solid var(--brand-cyan);
        }
        
        .btn-send {
            background: var(--brand-black);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            margin-top: 15px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .btn-send:hover {
            background: var(--brand-cyan);
            color: black;
        }
        
        footer {
            text-align: center;
            padding: 60px 0;
            color: #B2BEC3;
            font-size: 14px;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">KUVERA <span>PULSE</span></div>
        <div id="status-bar" style="font-size: 13px; margin-top: 10px; opacity: 0.8; font-weight: 300;">
            <span id="connection-status" style="color: #FFCC00;">●</span> Connecting to Insights Engine...
        </div>
        <button id="run-btn" onclick="triggerPulse()" style="margin-top: 20px; background: var(--brand-cyan); border: none; padding: 12px 24px; border-radius: 8px; font-weight: 800; cursor: pointer; font-family: 'Outfit'; box-shadow: 0 4px 15px rgba(0,209,255,0.3); transition: all 0.2s ease;">
            🚀 GENERATE NEW PULSE
        </button>
    </header>
    
    <div class="container">
        <div class="grid">
            <div id="themes-container">
                <div class="section-title">Critical Feedback Themes</div>
                <div class="card" style="text-align: center; color: #999;">
                    Connecting to AI...
                </div>
            </div>

            <div>
                <div class="section-title">Action Roadmap</div>
                <div id="actions-container" class="action-card">
                    <div class="action-item">Preparing insights...</div>
                </div>

                <div class="section-title">Stakeholder Drafts</div>
                <div id="drafts-container">
                    <div class="card" style="text-align: center; color: #999; font-size: 14px;">
                        Loading briefings...
                    </div>
                </div>
            </div>
        </div>

        <div class="section-title">Technical Pulse Data (JSON)</div>
        <div class="card" style="background: #1E1E1E; color: #D4D4D4; font-family: 'Courier New', Courier, monospace; padding: 25px; overflow-x: auto; font-size: 12px; border: none;">
            <pre id="json-raw">{}</pre>
        </div>
    </div>
    
    <footer>PROPRIETARY REPORT BY KUVERA BY CRED</footer>

    <script>
        const DEFAULT_BACKEND = "https://kuvera-pulse.onrender.com"; 
        const params = new URLSearchParams(window.location.search);
        const BACKEND_URL = params.get('backend') || DEFAULT_BACKEND;

        async function triggerPulse() {
            const btn = document.getElementById('run-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "⌛ ANALYZING REVIEWS (2 MINS)...";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            try {
                const response = await fetch(`${BACKEND_URL}/mcp/run-weekly-pulse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ app_name: "Kuvera", weeks: 8 })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `Server Error ${response.status}`);
                }
                
                alert("✅ Pulse Generation Successful! Refreshing dashboard...");
                await fetchPulse();
            } catch (err) {
                alert(`❌ Pulse Failed: ${err.message}\n\nACTION: Ensure GROQ_API_KEY is set in your Render Service -> Environment.`);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }

        async function fetchPulse() {
            const statusText = document.getElementById('status-bar');
            try {
                const response = await fetch(`${BACKEND_URL}/mcp/latest-results`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                const lastUpdated = data.last_updated ? new Date(data.last_updated).toLocaleString() : "Never";
                statusText.innerHTML = `<span id="connection-status" style="color: #00FF00;">●</span> Live | Last Synchronized: ${lastUpdated}`;
                
                renderThemes(data.insights.local_clusters);
                renderActions(data.insights.action_ideas);
                renderDrafts(data.emails);
                document.getElementById('json-raw').textContent = JSON.stringify(data.insights || {}, null, 2);
            } catch (err) {
                statusText.innerHTML = `<span id="connection-status" style="color: #FF0000;">●</span> Connection Failed | ${err.message}`;
            }
        }

        function renderThemes(clusters) {
            const container = document.getElementById('themes-container');
            container.innerHTML = '<div class="section-title">Critical Feedback Themes</div>';
            if (!clusters || Object.keys(clusters).length === 0) {
                container.innerHTML += '<div class="card">No data available. Click "Generate New Pulse" to begin.</div>';
                return;
            }
            Object.entries(clusters).sort((a,b) => b[1].volume - a[1].volume).slice(0, 3).forEach(([theme, data]) => {
                container.innerHTML += `
                    <div class="card">
                        <div class="theme-header">
                            <h3 style="margin:0; font-size: 20px;">${theme}</h3>
                            <span class="badge">Score: ${data.average_rating} / 5</span>
                        </div>
                        <div style="font-size: 13px; color: #999; margin-bottom: 20px;">Volume: ${data.volume} reviews</div>
                        ${(data.representative_quotes || []).slice(0, 2).map(q => `<div class="quote">"${q}"</div>`).join('')}
                    </div>`;
            });
        }

        function renderActions(ideas) {
            const container = document.getElementById('actions-container');
            if (!ideas || ideas.length === 0) {
                container.innerHTML = '<div class="action-item">Run pulse to see roadmap.</div>';
                return;
            }
            container.innerHTML = ideas.map(idea => `<div class="action-item">${idea}</div>`).join('');
        }

        function renderDrafts(emails) {
            const container = document.getElementById('drafts-container');
            if (!emails || emails.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center; color:#999;">Run pulse to generate drafts.</div>';
                return;
            }
            container.innerHTML = emails.map(draft => {
                const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&su=${encodeURIComponent(draft.subject)}&body=${encodeURIComponent(draft.body)}`;
                return `
                <div class="card stakeholder-card">
                    <h4 style="margin: 0 0 10px; font-size: 16px;">${draft.role}</h4>
                    <p style="font-size: 12px; color: #636E72; margin-bottom: 15px;">${draft.subject}</p>
                    <a href="${gmailUrl}" target="_blank" rel="noopener noreferrer" class="btn-send">Open in Gmail &rarr;</a>
                </div>`;
            }).join('');
        }
        fetchPulse();
    </script>
</body>
</html>
