name: Groww Pulsator Automated Ingestion Pipeline

on:
  schedule:
    # Trigger at 00:00 UTC on every 8th day of the month (e.g. 1st, 9th, 17th, 25th)
    - cron: '0 0 */8 * *'
  workflow_dispatch:
    # Allow manual triggers at any time from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install -r backend/requirements.txt
        # Forced install of urllib3 to avoid app-store-scraper dependency issues
        pip install urllib3==1.26.15

    - name: Execute Groww Pulsator Pipeline
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        APP_NAME: Groww
      run: |
        python backend/run_pipeline.py

    - name: Commit and Push Processed Review Insights
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Add generated processed data and outputs to commit
        git add backend/data/processed/clean_reviews_*.json
        git add backend/data/outputs/clustered_insights.json
        git add backend/data/outputs/Groww_weekly_pulse_*.md
        git add backend/data/outputs/Groww_weekly_pulse_*.pdf
        git add backend/data/outputs/Groww_Pulse_*_*.pdf
        git add backend/data/outputs/Groww_stakeholder_emails_*.json
        
        # Check if there are changes to commit
        if git diff-index --quiet HEAD --; then
          echo "No new reviews or generated briefs to commit."
        else
          git commit -m "Automated Ingestion Pipeline run (Every 8 Days)"
          git push origin main
        fi
